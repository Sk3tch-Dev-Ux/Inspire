services:
  postgres:
    image: postgres:16-alpine
    container_name: inspire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inspire
      POSTGRES_USER: inspire
      POSTGRES_PASSWORD: inspire
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - inspire-pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspire"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  inspire-web:
    build: .
    container_name: inspire-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      # Default bridge so postgres (also on default) is reachable.
      - default
      # Shared bridge with the host's docker-nginx-1 reverse proxy.
      # Nginx upstreams use the hostname `inspire-web:3000`, so we must
      # be on this network or `docker compose up -d` recreates will
      # 502 the public site until manually `docker network connect`-ed.
      - docker_frontend
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 explicitly — Alpine's resolver picks ::1 (IPv6) for
      # `localhost` first, but Next.js binds to 0.0.0.0 (IPv4 only) per
      # HOSTNAME=0.0.0.0 above, so IPv6 connections refuse. The container
      # is functionally healthy with that mismatch, just flagged
      # "unhealthy" in `docker ps`. This forces the IPv4 path.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  inspire-pg-data:

networks:
  default:
  docker_frontend:
    external: true
