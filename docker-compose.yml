services:
  postgres:
    image: postgres:16-alpine
    container_name: inspire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inspire
      POSTGRES_USER: inspire
      POSTGRES_PASSWORD: inspire
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - inspire-pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspire"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  inspire-web:
    build: .
    container_name: inspire-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  inspire-pg-data:
