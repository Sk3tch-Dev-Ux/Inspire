<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Portfolio placeholder — Rust game scripting.
       C# / Oxide-themed code rain with a centered server-status card. -->
  <defs>
    <linearGradient id="bgR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </linearGradient>
    <radialGradient id="glowR" cx="80%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bgR)"/>

  <!-- Code rain background — sparse Oxide / C# fragments -->
  <g font-family="ui-monospace, monospace" font-size="13" fill="#2D2D2D">
    <text x="60" y="160">[Plugin("ServerEventManager")]</text>
    <text x="60" y="180">public class ServerEventManager : RustPlugin</text>
    <text x="60" y="200">{</text>
    <text x="60" y="220">  void OnPlayerConnected(BasePlayer player) {</text>
    <text x="60" y="240">    SendNotification(player, "raid in 5m");</text>
    <text x="60" y="260">  }</text>
    <text x="60" y="280">}</text>

    <text x="900" y="180">// rust.config.json</text>
    <text x="900" y="200">"raid_announce_minutes": 5,</text>
    <text x="900" y="220">"team_size_max": 6,</text>
    <text x="900" y="240">"sleeper_protection": true</text>

    <text x="60" y="540">[OK] EventManager loaded · 1.2ms</text>
    <text x="60" y="560">[OK] HookCallback registered: 14</text>
    <text x="60" y="580">[OK] Postgres connection alive</text>
    <text x="60" y="600">[OK] Discord webhook test → 200</text>

    <text x="900" y="560">protected.OnEntityDeath()</text>
    <text x="900" y="580">  → triggerRaidAlert(BaseEntity)</text>
    <text x="900" y="600">  → notifyDiscord(team.id, "lost TC")</text>
    <text x="900" y="620">  → updatePlayerStats(killer)</text>
  </g>

  <rect width="1280" height="800" fill="url(#glowR)"/>

  <!-- Center server-status card -->
  <g transform="translate(380, 280)">
    <rect width="520" height="240" rx="16" fill="#0F0F0F" fill-opacity="0.95" stroke="#FF6B1A" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="32" y="44" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#FF6B1A" letter-spacing="3">ECONOMY · MAIN SERVER</text>

    <text x="32" y="120" font-family="'Space Grotesk', system-ui, sans-serif" font-size="56" font-weight="700" fill="#FAFAF7">42 / 120</text>
    <text x="32" y="148" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#7A7A7A">players online · wipe day 4</text>

    <text x="32" y="186" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#7A7A7A" letter-spacing="2">SERVER PERF</text>
    <rect x="32" y="194" width="456" height="10" rx="5" fill="#1A1A1A"/>
    <rect x="32" y="194" width="384" height="10" rx="5" fill="#FF6B1A"/>
    <text x="488" y="203" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#FF6B1A" text-anchor="end">240 / 256 fps</text>
  </g>

  <g font-family="ui-monospace, monospace" font-size="14" font-weight="500" fill="#FF6B1A">
    <rect x="64" y="64" width="120" height="34" rx="6" fill="#FF6B1A" fill-opacity="0.08" stroke="#FF6B1A" stroke-opacity="0.25"/>
    <text x="124" y="86" text-anchor="middle">⚡ Rust</text>
  </g>
</svg>
