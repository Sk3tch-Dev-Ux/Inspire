<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Portfolio placeholder — Custom website / Next.js project.
       Browser chrome with a stylized landing page mock inside. -->
  <defs>
    <linearGradient id="bgW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <radialGradient id="glowW" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridW" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 L0 40" fill="none" stroke="#FF6B1A" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="800" fill="url(#bgW)"/>
  <rect width="1280" height="800" fill="url(#gridW)"/>
  <rect width="1280" height="800" fill="url(#glowW)"/>

  <!-- Browser chrome -->
  <g transform="translate(140, 130)">
    <rect width="1000" height="540" rx="14" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1.5"/>

    <!-- Title bar -->
    <rect width="1000" height="48" rx="14" fill="#0F0F0F"/>
    <rect y="36" width="1000" height="12" fill="#0F0F0F"/>
    <circle cx="22" cy="24" r="6" fill="#FF6B1A"/>
    <circle cx="44" cy="24" r="6" fill="#2D2D2D"/>
    <circle cx="66" cy="24" r="6" fill="#2D2D2D"/>

    <!-- URL bar -->
    <rect x="100" y="14" width="800" height="22" rx="11" fill="#0A0A0A"/>
    <text x="116" y="29" font-family="ui-monospace, monospace" font-size="12" font-weight="500" fill="#7A7A7A">https://yoursite.com</text>

    <!-- Page content mock -->
    <!-- Top nav -->
    <rect x="32" y="80" width="80" height="14" rx="3" fill="#FF6B1A"/>
    <rect x="816" y="80" width="60" height="14" rx="3" fill="#2D2D2D"/>
    <rect x="884" y="80" width="60" height="14" rx="3" fill="#2D2D2D"/>

    <!-- Hero block -->
    <rect x="32" y="146" width="120" height="22" rx="4" fill="#FF6B1A" fill-opacity="0.18"/>
    <text x="40" y="162" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#FF6B1A" letter-spacing="2">YOUR BRAND</text>

    <text x="32" y="220" font-family="'Space Grotesk', system-ui, sans-serif" font-size="48" font-weight="700" fill="#FAFAF7">Built fast.</text>
    <text x="32" y="270" font-family="'Space Grotesk', system-ui, sans-serif" font-size="48" font-weight="700" fill="#FF6B1A">Iterated weekly.</text>

    <text x="32" y="310" font-family="system-ui, sans-serif" font-size="16" font-weight="400" fill="#7A7A7A">Marketing site or web app —</text>
    <text x="32" y="332" font-family="system-ui, sans-serif" font-size="16" font-weight="400" fill="#7A7A7A">Next.js, TypeScript, Tailwind.</text>

    <!-- Buttons -->
    <rect x="32" y="370" width="140" height="44" rx="8" fill="#FF6B1A"/>
    <text x="102" y="397" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0A0A0A" text-anchor="middle">Get a Quote</text>

    <rect x="184" y="370" width="140" height="44" rx="8" fill="none" stroke="#2D2D2D" stroke-width="1"/>
    <text x="254" y="397" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FAFAF7" text-anchor="middle">View Work</text>

    <!-- Right-side card placeholders -->
    <g transform="translate(540, 140)">
      <rect width="408" height="260" rx="12" fill="#0F0F0F" stroke="#2D2D2D"/>
      <rect x="20" y="20" width="60" height="18" rx="4" fill="#FF6B1A" fill-opacity="0.18"/>
      <text x="28" y="34" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#FF6B1A" letter-spacing="2">FEATURED</text>

      <text x="20" y="74" font-family="'Space Grotesk', system-ui, sans-serif" font-size="20" font-weight="700" fill="#FAFAF7">Web App Dashboard</text>

      <rect x="20" y="100" width="368" height="6" rx="3" fill="#2D2D2D"/>
      <rect x="20" y="116" width="320" height="6" rx="3" fill="#2D2D2D"/>
      <rect x="20" y="132" width="280" height="6" rx="3" fill="#2D2D2D"/>

      <!-- mini stats -->
      <g transform="translate(20, 170)">
        <text font-family="ui-monospace, monospace" font-size="10" fill="#7A7A7A" letter-spacing="2">USERS</text>
        <text y="22" font-family="'Space Grotesk', system-ui, sans-serif" font-size="22" font-weight="700" fill="#FF6B1A">12,840</text>
      </g>
      <g transform="translate(180, 170)">
        <text font-family="ui-monospace, monospace" font-size="10" fill="#7A7A7A" letter-spacing="2">REVENUE</text>
        <text y="22" font-family="'Space Grotesk', system-ui, sans-serif" font-size="22" font-weight="700" fill="#FAFAF7">$48k</text>
      </g>
      <g transform="translate(320, 170)">
        <text font-family="ui-monospace, monospace" font-size="10" fill="#7A7A7A" letter-spacing="2">UPTIME</text>
        <text y="22" font-family="'Space Grotesk', system-ui, sans-serif" font-size="22" font-weight="700" fill="#FAFAF7">99.9</text>
      </g>
    </g>
  </g>

  <g font-family="ui-monospace, monospace" font-size="14" font-weight="500" fill="#FF6B1A">
    <rect x="64" y="64" width="120" height="34" rx="6" fill="#FF6B1A" fill-opacity="0.08" stroke="#FF6B1A" stroke-opacity="0.25"/>
    <text x="124" y="86" text-anchor="middle">⚡ Web</text>
  </g>
</svg>
