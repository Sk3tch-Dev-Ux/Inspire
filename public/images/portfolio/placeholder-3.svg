<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Portfolio placeholder #3 — Game script (DayZ themed).
       Stylized HUD-style overlay with a code-rain background. Reads as
       "in-game system" without requiring a real screenshot. -->

  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg3)"/>

  <!-- Code-rain background — sparse mono characters scattered in steel.
       Hand-placed for visual rhythm. -->
  <g font-family="ui-monospace, monospace" font-size="13" fill="#2D2D2D">
    <text x="80" y="200">function trader.openShop()</text>
    <text x="80" y="220">  if not player:isAlive() then return</text>
    <text x="80" y="240">  local inventory = trader:getInventory()</text>
    <text x="80" y="260">  ui:show(inventory, player:getRep())</text>
    <text x="80" y="280">end</text>

    <text x="900" y="160">// trader-zones.cs</text>
    <text x="900" y="180">DayZTrader::Init();</text>
    <text x="900" y="200">DayZTrader::LoadConfig();</text>
    <text x="900" y="220">DayZTrader::SpawnNPCs();</text>

    <text x="80" y="500">[OK] trader.config.json loaded</text>
    <text x="80" y="520">[OK] 14 trader zones registered</text>
    <text x="80" y="540">[OK] price_db connected</text>
    <text x="80" y="560">[OK] faction discount table loaded</text>

    <text x="900" y="540">DB query: SELECT * FROM trades</text>
    <text x="900" y="560">  WHERE faction = 'survivor'</text>
    <text x="900" y="580">  AND tier &lt;= player.rep_tier</text>
    <text x="900" y="600">ORDER BY price DESC LIMIT 12;</text>
  </g>

  <rect width="1280" height="800" fill="url(#glow3)"/>

  <!-- Center HUD card -->
  <g transform="translate(380, 280)">
    <rect width="520" height="240" rx="16" fill="#0F0F0F" fill-opacity="0.95" stroke="#FF6B1A" stroke-opacity="0.3" stroke-width="1.5"/>

    <!-- Top label -->
    <text x="32" y="44" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#FF6B1A" letter-spacing="3">TRADER ZONE · GREEN MOUNTAIN</text>

    <!-- Big stat -->
    <text x="32" y="120" font-family="'Space Grotesk', system-ui, sans-serif" font-size="56" font-weight="700" fill="#FAFAF7">$8,420</text>
    <text x="32" y="148" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#7A7A7A">player credits available</text>

    <!-- Bar — health/reputation -->
    <text x="32" y="186" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#7A7A7A" letter-spacing="2">REPUTATION</text>
    <rect x="32" y="194" width="456" height="10" rx="5" fill="#1A1A1A"/>
    <rect x="32" y="194" width="320" height="10" rx="5" fill="#FF6B1A"/>
    <text x="488" y="203" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#FF6B1A" text-anchor="end">+3,250 / 5,000</text>
  </g>

  <!-- Category marker top-left -->
  <g font-family="ui-monospace, monospace" font-size="14" font-weight="500" fill="#FF6B1A">
    <rect x="64" y="64" width="120" height="34" rx="6" fill="#FF6B1A" fill-opacity="0.08" stroke="#FF6B1A" stroke-opacity="0.25"/>
    <text x="124" y="86" text-anchor="middle">⚡ DayZ</text>
  </g>

  <!-- Bottom-right icon plate -->
  <g transform="translate(1100, 660)">
    <rect width="100" height="40" rx="6" fill="#1A1A1A" stroke="#2D2D2D"/>
    <text x="50" y="26" font-family="ui-monospace, monospace" font-size="13" font-weight="600" fill="#7A7A7A" text-anchor="middle">enscript</text>
  </g>
</svg>
