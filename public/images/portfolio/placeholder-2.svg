<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Portfolio placeholder #2 — Discord Layout / Server Setup.
       Stylized Discord-style sidebar with categories, channels, and an
       active orange-highlighted channel. Communicates "I structure
       servers" without being a literal screenshot. -->

  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg2)"/>
  <rect width="1280" height="800" fill="url(#glow2)"/>

  <!-- Sidebar mockup (centered) -->
  <g transform="translate(440, 130)">
    <rect width="400" height="540" rx="14" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1.5"/>

    <!-- Server header -->
    <rect width="400" height="56" rx="14" fill="#0F0F0F"/>
    <rect y="44" width="400" height="12" fill="#0F0F0F"/>
    <text x="24" y="36" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FAFAF7">⚡ Inspire Community</text>

    <!-- Category 1 — INFO -->
    <text x="24" y="92" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#7A7A7A" letter-spacing="2">▾ INFO</text>
    <g font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#FAFAF7">
      <text x="38" y="118"># welcome</text>
      <text x="38" y="146"># rules</text>
      <text x="38" y="174"># announcements</text>
    </g>

    <!-- Category 2 — COMMUNITY (with active highlighted channel) -->
    <text x="24" y="216" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#7A7A7A" letter-spacing="2">▾ COMMUNITY</text>

    <!-- Active channel — orange highlight -->
    <rect x="14" y="226" width="372" height="32" rx="6" fill="#FF6B1A" fill-opacity="0.14"/>
    <text x="38" y="247" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FF6B1A"># general</text>
    <circle cx="370" cy="242" r="4" fill="#FF6B1A"/>

    <text x="38" y="284" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#FAFAF7"># memes</text>
    <text x="38" y="312" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#FAFAF7"># clips</text>
    <text x="38" y="340" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#7A7A7A">🔒 vip-lounge</text>

    <!-- Category 3 — VOICE -->
    <text x="24" y="380" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#7A7A7A" letter-spacing="2">▾ VOICE</text>
    <text x="38" y="406" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#FAFAF7">🔊 lobby</text>
    <text x="38" y="434" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#FAFAF7">🔊 squad-1</text>
    <text x="38" y="462" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#FAFAF7">🔊 squad-2</text>

    <!-- Category 4 — STAFF -->
    <text x="24" y="500" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#7A7A7A" letter-spacing="2">▾ STAFF</text>
    <text x="38" y="526" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#7A7A7A">🔒 mod-chat</text>
  </g>

  <!-- Role chips floating in the right margin -->
  <g transform="translate(900, 220)">
    <rect width="240" height="34" rx="6" fill="#FF6B1A" fill-opacity="0.10" stroke="#FF6B1A" stroke-opacity="0.4"/>
    <text x="120" y="22" font-family="ui-monospace, monospace" font-size="13" font-weight="600" fill="#FF6B1A" text-anchor="middle">@admin</text>

    <rect y="48" width="240" height="34" rx="6" fill="#7A7A7A" fill-opacity="0.10" stroke="#7A7A7A" stroke-opacity="0.4"/>
    <text x="120" y="70" font-family="ui-monospace, monospace" font-size="13" font-weight="600" fill="#FAFAF7" text-anchor="middle">@moderator</text>

    <rect y="96" width="240" height="34" rx="6" fill="#FAFAF7" fill-opacity="0.04" stroke="#FAFAF7" stroke-opacity="0.2"/>
    <text x="120" y="118" font-family="ui-monospace, monospace" font-size="13" font-weight="500" fill="#FAFAF7" text-anchor="middle">@member</text>

    <rect y="144" width="240" height="34" rx="6" fill="#FAFAF7" fill-opacity="0.04" stroke="#FAFAF7" stroke-opacity="0.2"/>
    <text x="120" y="166" font-family="ui-monospace, monospace" font-size="13" font-weight="500" fill="#FAFAF7" text-anchor="middle">@verified</text>

    <rect y="192" width="240" height="34" rx="6" fill="#FAFAF7" fill-opacity="0.04" stroke="#FAFAF7" stroke-opacity="0.2"/>
    <text x="120" y="214" font-family="ui-monospace, monospace" font-size="13" font-weight="500" fill="#FAFAF7" text-anchor="middle">@bot</text>
  </g>

  <!-- Category marker top-left -->
  <g font-family="ui-monospace, monospace" font-size="14" font-weight="500" fill="#FF6B1A">
    <rect x="64" y="64" width="200" height="34" rx="6" fill="#FF6B1A" fill-opacity="0.08" stroke="#FF6B1A" stroke-opacity="0.25"/>
    <text x="164" y="86" text-anchor="middle">⚡ Discord Layout</text>
  </g>
</svg>
